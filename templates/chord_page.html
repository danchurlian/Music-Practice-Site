{% extends "layout.html" %}
{% block main %}
    <section class="main_content">
        <h1>Chord Identification Practice </h1>
        <form method="post">
            <label for="chord_answer">What is the name of this chord?</label>
            <input name="chord_answer" autocomplete="off" autofocus="true" />
        </form>
        <div>{{ feedback }}</div>
        <table>
            <tr><th>Examples</th></tr>
            <tr><td>C major</td></tr>
            <tr><td>C minor</td></tr>
            <tr><td>C diminished</td></tr>
            <tr><td>C half-diminished 7th</td></tr>
            <tr><td>C diminished 7th</td></tr>
            <tr><td>C augmented</td></tr>
        </table>
        <!-- <div>This is a {{ answer }}</div> -->
        <section style="width:50%">
            {{ music_svg | safe }}
        </section>
    </section>
{% endblock %}
